services:
  mcp-quotation:
    container_name: mcp-quotation-server
    image: mcp-quotation-server
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MCP_HTTP_PORT=9533
    restart: unless-stopped
    ports:
      - "${MCP_HTTP_PORT:-9533}:9533"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:9533/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - infra_net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

networks:
  infra_net:
    external: true
    name: infra_net
